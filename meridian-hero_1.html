<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meridian Flow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: transparent;
  }
  canvas {
    display: block;
    width: 100% !important;
    height: 100% !important;
    background: transparent;
  }
</style>
</head>
<body>
<canvas id="threeCanvas"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
// ─── RENDERER ────────────────────────────────────────────────────────────────
const canvas = document.getElementById('threeCanvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.01, 100);

// ─── LIGHTING ────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xfff5d0, 0.5));
const goldLight = new THREE.PointLight(0xF5C842, 2.5, 10);
goldLight.position.set(0, 1.6, 2);
scene.add(goldLight);
const rimLight = new THREE.DirectionalLight(0xFFE070, 0.5);
rimLight.position.set(-2, 3, -1);
scene.add(rimLight);

// ─── BODY MODEL ──────────────────────────────────────────────────────────────
const MODEL_URL = 'https://caribbeantarzan.github.io/meridian/3d_human_body_wireframe_model.glb';

let bodyGroup = new THREE.Group();
scene.add(bodyGroup);

// These will be set once model loads
let bodyHeight = 3.2;
let bodyCenter = new THREE.Vector3(0, 1.6, 0);

const loader = new THREE.GLTFLoader();
loader.load(MODEL_URL, (gltf) => {
  const model = gltf.scene;
  const box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const scale = 3.2 / Math.max(size.x, size.y, size.z);

  model.scale.setScalar(scale);
  model.position.set(
    -center.x * scale,
    -center.y * scale + 1.6,
    -center.z * scale
  );

  model.traverse(child => {
    if (child.isMesh) {
      child.material = new THREE.MeshPhongMaterial({
        color: 0xAADDBB,
        transparent: true,
        opacity: 0.18,
        side: THREE.DoubleSide,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
      });
    }
  });

  bodyGroup.add(model);

  // Recalculate actual body bounds after load
  const b = new THREE.Box3().setFromObject(bodyGroup);
  bodyHeight = b.getSize(new THREE.Vector3()).y;
  bodyCenter = b.getCenter(new THREE.Vector3());

  buildMeridians();
  buildParticles();

}, undefined, () => buildFallbackBody());

function buildFallbackBody() {
  const mat = new THREE.MeshPhongMaterial({
    color: 0xAADDBB, transparent: true, opacity: 0.15,
    side: THREE.DoubleSide, depthWrite: false,
    blending: THREE.AdditiveBlending, wireframe: true,
  });
  const parts = [
    [new THREE.CylinderGeometry(0.26, 0.22, 1.3, 12), [0, 1.65, 0]],
    [new THREE.SphereGeometry(0.21, 12, 8),            [0, 2.65, 0]],
    [new THREE.CylinderGeometry(0.22, 0.2, 0.38, 10), [0, 0.96, 0]],
    [new THREE.CylinderGeometry(0.1,  0.08, 1.1, 8),  [-0.14, 0.25, 0]],
    [new THREE.CylinderGeometry(0.1,  0.08, 1.1, 8),  [ 0.14, 0.25, 0]],
  ];
  parts.forEach(([geo, pos]) => {
    const m = new THREE.Mesh(geo, mat.clone());
    m.position.set(...pos);
    bodyGroup.add(m);
  });
  buildMeridians();
  buildParticles();
}

// ─── MERIDIANS ───────────────────────────────────────────────────────────────
// Corrected paths matching actual TCM meridian routes on the body.
// Body: feet ~y=0.05, crown ~y=3.15, front z positive, back z negative
// Left side: x negative, Right side: x positive

let allCurves = [];
const meridianGroup = new THREE.Group();
scene.add(meridianGroup);

function buildMeridians() {
  // Clear old
  while (meridianGroup.children.length) meridianGroup.remove(meridianGroup.children[0]);
  allCurves = [];

  const meridians = [
    // Du Mai (Governing Vessel) — runs up the SPINE (back midline)
    { color: 0xFFCC22, width: 0.009, points: [
      [0, 0.15, -0.13],
      [0, 0.5,  -0.15],
      [0, 0.9,  -0.17],
      [0, 1.3,  -0.19],
      [0, 1.7,  -0.20],
      [0, 2.1,  -0.19],
      [0, 2.5,  -0.15],
      [0, 2.8,  -0.08],
      [0, 3.0,   0.00],
      [0, 3.15,  0.08],
    ]},

    // Ren Mai (Conception Vessel) — front midline, throat to pubis
    { color: 0xFFAA33, width: 0.009, points: [
      [0, 0.12,  0.14],
      [0, 0.5,   0.16],
      [0, 0.9,   0.18],
      [0, 1.3,   0.20],
      [0, 1.65,  0.22],
      [0, 2.0,   0.20],
      [0, 2.4,   0.16],
      [0, 2.75,  0.10],
      [0, 3.05,  0.04],
    ]},

    // RIGHT Lung Meridian — inner arm, shoulder → thumb
    { color: 0xFFDD55, width: 0.007, points: [
      [ 0.20, 2.00,  0.10],
      [ 0.32, 1.80,  0.08],
      [ 0.46, 1.55,  0.06],
      [ 0.58, 1.28,  0.04],
      [ 0.68, 1.02,  0.03],
      [ 0.76, 0.78,  0.02],
      [ 0.82, 0.55,  0.01],
      [ 0.86, 0.34,  0.00],
    ]},

    // LEFT Lung Meridian (mirror)
    { color: 0xFFDD55, width: 0.007, points: [
      [-0.20, 2.00,  0.10],
      [-0.32, 1.80,  0.08],
      [-0.46, 1.55,  0.06],
      [-0.58, 1.28,  0.04],
      [-0.68, 1.02,  0.03],
      [-0.76, 0.78,  0.02],
      [-0.82, 0.55,  0.01],
      [-0.86, 0.34,  0.00],
    ]},

    // RIGHT Stomach Meridian — front of leg, hip to toe
    { color: 0xFFBB22, width: 0.007, points: [
      [ 0.06, 2.60,  0.16],
      [ 0.09, 2.20,  0.18],
      [ 0.11, 1.80,  0.19],
      [ 0.13, 1.40,  0.19],
      [ 0.14, 1.00,  0.17],
      [ 0.13, 0.60,  0.14],
      [ 0.11, 0.28,  0.10],
      [ 0.08, 0.05,  0.06],
    ]},

    // LEFT Stomach Meridian (mirror)
    { color: 0xFFBB22, width: 0.007, points: [
      [-0.06, 2.60,  0.16],
      [-0.09, 2.20,  0.18],
      [-0.11, 1.80,  0.19],
      [-0.13, 1.40,  0.19],
      [-0.14, 1.00,  0.17],
      [-0.13, 0.60,  0.14],
      [-0.11, 0.28,  0.10],
      [-0.08, 0.05,  0.06],
    ]},

    // RIGHT Bladder Meridian — para-spinal, head → foot (back of leg)
    { color: 0xE8A820, width: 0.006, points: [
      [ 0.05, 3.10,  0.00],
      [ 0.07, 2.70, -0.12],
      [ 0.09, 2.30, -0.16],
      [ 0.11, 1.90, -0.18],
      [ 0.12, 1.50, -0.18],
      [ 0.13, 1.10, -0.16],
      [ 0.14, 0.70, -0.12],
      [ 0.13, 0.30, -0.06],
      [ 0.10, 0.05, -0.02],
    ]},

    // LEFT Bladder Meridian (mirror)
    { color: 0xE8A820, width: 0.006, points: [
      [-0.05, 3.10,  0.00],
      [-0.07, 2.70, -0.12],
      [-0.09, 2.30, -0.16],
      [-0.11, 1.90, -0.18],
      [-0.12, 1.50, -0.18],
      [-0.13, 1.10, -0.16],
      [-0.14, 0.70, -0.12],
      [-0.13, 0.30, -0.06],
      [-0.10, 0.05, -0.02],
    ]},

    // RIGHT Gallbladder Meridian — side of body, hip to ankle
    { color: 0xFFCC44, width: 0.006, points: [
      [ 0.22, 2.55, -0.05],
      [ 0.24, 2.20,  0.00],
      [ 0.25, 1.80,  0.02],
      [ 0.24, 1.40,  0.02],
      [ 0.22, 1.00,  0.00],
      [ 0.20, 0.60, -0.02],
      [ 0.17, 0.22, -0.04],
    ]},

    // LEFT Gallbladder Meridian (mirror)
    { color: 0xFFCC44, width: 0.006, points: [
      [-0.22, 2.55, -0.05],
      [-0.24, 2.20,  0.00],
      [-0.25, 1.80,  0.02],
      [-0.24, 1.40,  0.02],
      [-0.22, 1.00,  0.00],
      [-0.20, 0.60, -0.02],
      [-0.17, 0.22, -0.04],
    ]},
  ];

  meridians.forEach(m => {
    const pts = m.points.map(p => new THREE.Vector3(...p));
    const curve = new THREE.CatmullRomCurve3(pts);
    allCurves.push(curve);

    // Core tube
    const tubeGeo = new THREE.TubeGeometry(curve, 80, m.width, 6, false);
    const tubeMat = new THREE.MeshBasicMaterial({
      color: m.color, transparent: true, opacity: 0.9,
    });
    meridianGroup.add(new THREE.Mesh(tubeGeo, tubeMat));

    // Outer glow
    const haloGeo = new THREE.TubeGeometry(curve, 80, m.width * 3, 6, false);
    const haloMat = new THREE.MeshBasicMaterial({
      color: m.color, transparent: true, opacity: 0.15,
      blending: THREE.AdditiveBlending, depthWrite: false,
    });
    meridianGroup.add(new THREE.Mesh(haloGeo, haloMat));
  });
}

// ─── PARTICLES ───────────────────────────────────────────────────────────────
const particlePool = [];

function buildParticles() {
  particlePool.forEach(p => scene.remove(p.mesh));
  particlePool.length = 0;

  if (!allCurves.length) return;

  const geo = new THREE.SphereGeometry(0.016, 6, 6);
  for (let i = 0; i < 100; i++) {
    const mat = new THREE.MeshBasicMaterial({
      color: 0xFFEE88,
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });
    const mesh = new THREE.Mesh(geo, mat);
    const ci = Math.floor(Math.random() * allCurves.length);
    const t  = Math.random();
    particlePool.push({ mesh, ci, t, speed: 0.0006 + Math.random() * 0.001 });
    scene.add(mesh);
  }
}

// ─── CAMERA SCROLL PATH ──────────────────────────────────────────────────────
// t=0: wide front view
// t=0.2: move in to chest
// t=0.4: enter body (torso level)
// t=0.6: descend through abdomen/legs
// t=0.8: come back up inside
// t=1.0: pull back, top-down view

const camPath = new THREE.CatmullRomCurve3([
  new THREE.Vector3( 0,   1.70,  4.2),  // 0.0 — wide establishing
  new THREE.Vector3( 0,   1.70,  2.8),  // 0.15
  new THREE.Vector3( 0.1, 1.65,  1.2),  // 0.3  — entering
  new THREE.Vector3( 0,   1.50,  0.3),  // 0.45 — inside chest
  new THREE.Vector3( 0,   1.10,  0.2),  // 0.55 — abdomen
  new THREE.Vector3( 0,   0.60,  0.25), // 0.65 — lower body
  new THREE.Vector3( 0,   0.20,  0.35), // 0.75 — near feet
  new THREE.Vector3( 0,   1.20,  0.15), // 0.85 — rise up
  new THREE.Vector3( 0,   2.60,  0.4),  // 0.92 — upper chest
  new THREE.Vector3( 0,   3.50,  1.8),  // 1.0  — exit above
]);

const lookPath = new THREE.CatmullRomCurve3([
  new THREE.Vector3(0, 1.60, 0),
  new THREE.Vector3(0, 1.60, 0),
  new THREE.Vector3(0, 1.55, 0),
  new THREE.Vector3(0, 1.40, 0),
  new THREE.Vector3(0, 1.10, 0),
  new THREE.Vector3(0, 0.70, 0),
  new THREE.Vector3(0, 0.30, 0),
  new THREE.Vector3(0, 1.20, 0),
  new THREE.Vector3(0, 2.20, 0),
  new THREE.Vector3(0, 2.00, 0),
]);

// Start camera at t=0 position
camera.position.copy(camPath.getPoint(0));
camera.lookAt(lookPath.getPoint(0));

// ─── SCROLL HANDLING ─────────────────────────────────────────────────────────
let scrollProgress = 0;
let targetProgress = 0;

// From Wix Velo via postMessage
window.addEventListener('message', (e) => {
  if (e.data && typeof e.data.meridianScroll === 'number') {
    targetProgress = Math.min(Math.max(e.data.meridianScroll, 0), 1);
  }
});

// Fallback: own scroll (when opened directly in browser for testing)
window.addEventListener('scroll', () => {
  const el = document.documentElement;
  const max = el.scrollHeight - el.clientHeight;
  if (max > 0) targetProgress = el.scrollTop / max;
}, { passive: true });

// ─── ANIMATION LOOP ──────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Smooth scroll lerp
  scrollProgress += (targetProgress - scrollProgress) * 0.05;

  // Move particles
  particlePool.forEach(p => {
    p.t += p.speed;
    if (p.t > 1) p.t -= 1;
    if (allCurves[p.ci]) {
      p.mesh.position.copy(allCurves[p.ci].getPoint(p.t));
      p.mesh.material.opacity = 0.4 + 0.6 * Math.sin(t * 4 + p.t * 15);
    }
  });

  // Camera follows scroll path
  const camPos  = camPath.getPoint(scrollProgress);
  const lookAt  = lookPath.getPoint(scrollProgress);
  camera.position.lerp(camPos, 0.07);
  camera.lookAt(lookAt);

  // Pulse glow
  goldLight.intensity = 1.8 + 0.7 * Math.sin(t * 2.0);

  // Subtle body sway
  bodyGroup.rotation.y = Math.sin(t * 0.2) * 0.06;

  renderer.render(scene, camera);
}

animate();

// ─── RESIZE ──────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
