<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meridian Flow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden; /* No internal scroll — Velo drives everything */
    background: transparent;
  }

  #sticky-scene {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  #sticky-scene > * { pointer-events: all; }

  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: transparent;
  }

  /* Meridian label */
  #meridian-label {
    position: absolute;
    top: 42%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
    z-index: 20;
    opacity: 0;
    transition: opacity 0.7s ease;
    padding: 22px 40px 18px;
    /* Soft dark radial backdrop — always readable, never harsh */
    background: radial-gradient(ellipse at center,
      rgba(0,0,0,0.72) 0%,
      rgba(0,0,0,0.48) 45%,
      rgba(0,0,0,0.0) 100%
    );
    border-radius: 50%;
  }
  #meridian-label .name {
    font-family: 'Georgia', serif;
    font-size: clamp(1.1rem, 2.5vw, 1.8rem);
    color: #F5C842;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    /* Dark outline shadow for crisp readability + gold glow for beauty */
    text-shadow:
      0 0 1px rgba(0,0,0,1),
      0 1px 3px rgba(0,0,0,0.9),
      -1px 0 2px rgba(0,0,0,0.9),
      1px 0 2px rgba(0,0,0,0.9),
      0 0 20px rgba(245,200,66,0.8),
      0 0 50px rgba(245,200,66,0.3);
  }
  #meridian-label .organ {
    font-family: 'Georgia', serif;
    font-size: clamp(0.65rem, 1.2vw, 0.9rem);
    color: rgba(245,220,120,0.9);
    letter-spacing: 0.18em;
    margin-top: 6px;
    text-shadow:
      0 0 1px rgba(0,0,0,1),
      0 1px 3px rgba(0,0,0,0.9),
      0 0 12px rgba(245,200,66,0.4);
  }

  /* Scroll hint at start */
  #scroll-hint {
    position: absolute;
    bottom: 6%;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
    z-index: 20;
    transition: opacity 0.6s ease;
  }
  #scroll-hint span {
    font-family: 'Georgia', serif;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    color: rgba(245,200,66,0.5);
    text-transform: uppercase;
  }
  .arrow-line {
    width: 1px;
    height: 36px;
    background: linear-gradient(to bottom, rgba(245,200,66,0.6), transparent);
    margin: 8px auto 0;
    animation: pulse-down 2s ease-in-out infinite;
  }
  @keyframes pulse-down {
    0%, 100% { opacity: 0.3; transform: scaleY(1); }
    50% { opacity: 1; transform: scaleY(1.15); }
  }

  /* Progress bar */
  #progress-bar {
    position: absolute;
    left: 28px;
    top: 50%;
    transform: translateY(-50%);
    width: 2px;
    height: 120px;
    background: rgba(245,200,66,0.15);
    border-radius: 2px;
    z-index: 20;
  }
  #progress-fill {
    width: 100%;
    height: 0%;
    background: linear-gradient(to bottom, #F5C842, #FF8C00);
    border-radius: 2px;
    transition: height 0.1s linear;
    box-shadow: 0 0 8px rgba(245,200,66,0.6);
  }

  /* End CTA */
  #end-cta {
    position: absolute;
    bottom: 10%;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
    z-index: 20;
    opacity: 0;
    transition: opacity 1s ease;
    white-space: nowrap;
    padding: 32px 52px 28px;
    /* Same soft dark radial backdrop as the meridian labels */
    background: radial-gradient(ellipse at center,
      rgba(0,0,0,0.80) 0%,
      rgba(0,0,0,0.55) 50%,
      rgba(0,0,0,0.0) 100%
    );
    border-radius: 50%;
  }
  #end-cta.visible { opacity: 1; pointer-events: all; }
  #end-cta p {
    font-family: 'Georgia', serif;
    font-size: clamp(0.8rem, 1.6vw, 1.05rem);
    color: rgba(245,220,120,0.95);
    letter-spacing: 0.14em;
    margin-bottom: 20px;
    text-shadow:
      0 0 1px rgba(0,0,0,1),
      0 1px 4px rgba(0,0,0,0.95),
      -1px 0 2px rgba(0,0,0,0.9),
      1px 0 2px rgba(0,0,0,0.9),
      0 0 16px rgba(245,200,66,0.3);
  }
  #end-cta a {
    display: inline-block;
    padding: 13px 32px;
    border: 1px solid rgba(245,200,66,0.8);
    color: #F5C842;
    font-family: 'Georgia', serif;
    font-size: clamp(0.72rem, 1.3vw, 0.92rem);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-decoration: none;
    /* Solid dark background on the button itself — always readable */
    background: rgba(0,0,0,0.65);
    text-shadow:
      0 0 1px rgba(0,0,0,1),
      0 1px 3px rgba(0,0,0,0.9),
      0 0 12px rgba(245,200,66,0.5);
    transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
    box-shadow: 0 0 20px rgba(245,200,66,0.15), inset 0 0 20px rgba(0,0,0,0.3);
  }
  #end-cta a:hover {
    background: rgba(0,0,0,0.80);
    border-color: rgba(245,200,66,1);
    box-shadow: 0 0 30px rgba(245,200,66,0.35), inset 0 0 20px rgba(0,0,0,0.3);
  }

  /* Sound button */
  #sound-btn {
    position: absolute;
    top: 18px;
    right: 18px;
    z-index: 30;
    background: rgba(245,200,66,0.08);
    border: 1px solid rgba(245,200,66,0.25);
    color: rgba(245,200,66,0.6);
    font-family: 'Georgia', serif;
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    padding: 7px 13px;
    cursor: pointer;
    transition: all 0.3s;
  }
  #sound-btn:hover { background: rgba(245,200,66,0.18); color: #F5C842; }
</style>
</head>
<body>

<div id="sticky-scene">
    <canvas id="threeCanvas"></canvas>

    <div id="meridian-label">
      <div class="name" id="label-name"></div>
      <div class="organ" id="label-organ"></div>
    </div>

    <div id="scroll-hint">
      <span>Scroll to journey within</span>
      <div class="arrow-line"></div>
    </div>

    <div id="progress-bar">
      <div id="progress-fill"></div>
    </div>

    <div id="end-cta">
      <p>Your body holds ancient wisdom</p>
      <a href="https://meridian.caribbeantarzan.com" target="_parent">
        Discover Your Meridian Health →
      </a>
    </div>

    <button id="sound-btn" onclick="toggleSound()">♪ SOUND OFF</button>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>

<script>
// ═══════════════════════════════════════════
// RENDERER
// ═══════════════════════════════════════════
const canvas = document.getElementById('threeCanvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);
renderer.toneMapping = THREE.ReinhardToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.01, 100);

// ═══════════════════════════════════════════
// BLOOM
// ═══════════════════════════════════════════
let composer;
try {
  const renderPass = new THREE.RenderPass(scene, camera);
  const bloomPass = new THREE.UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight), 1.4, 0.5, 0.2
  );
  composer = new THREE.EffectComposer(renderer);
  composer.addPass(renderPass);
  composer.addPass(bloomPass);
} catch(e) { composer = null; }

// ═══════════════════════════════════════════
// LIGHTING
// ═══════════════════════════════════════════
scene.add(new THREE.AmbientLight(0xfff5d0, 0.4));
const goldLight = new THREE.PointLight(0xF5C842, 3.0, 12);
goldLight.position.set(0, 1.6, 2);
scene.add(goldLight);
const rimLight = new THREE.DirectionalLight(0xFFE070, 0.6);
rimLight.position.set(-2, 3, -1);
scene.add(rimLight);
const fillLight = new THREE.PointLight(0xFF8C00, 1.0, 8);
fillLight.position.set(1.5, 2.5, 1);
scene.add(fillLight);

// ═══════════════════════════════════════════
// MERIDIAN DEFINITIONS
// ═══════════════════════════════════════════
const MERIDIAN_DEFS = [
  { name: 'Governing Vessel', organ: 'Du Mai · Spine & Yang', color: 0xFFCC22, width: 0.009,
    points: [[0,0.15,-0.13],[0,0.5,-0.15],[0,0.9,-0.17],[0,1.3,-0.19],[0,1.7,-0.20],[0,2.1,-0.19],[0,2.5,-0.15],[0,2.8,-0.08],[0,3.0,0.00],[0,3.15,0.08]],
    acupoints: [0.15,0.45,0.75] },
  { name: 'Conception Vessel', organ: 'Ren Mai · Front Midline & Yin', color: 0xFFAA33, width: 0.009,
    points: [[0,0.12,0.14],[0,0.5,0.16],[0,0.9,0.18],[0,1.3,0.20],[0,1.65,0.22],[0,2.0,0.20],[0,2.4,0.16],[0,2.75,0.10],[0,3.05,0.04]],
    acupoints: [0.2,0.5,0.8] },
  { name: 'Lung Meridian', organ: 'Tài Yīn · Metal · Respiration', color: 0xE8E8FF, width: 0.007,
    points: [[0.20,2.00,0.10],[0.32,1.80,0.08],[0.46,1.55,0.06],[0.58,1.28,0.04],[0.68,1.02,0.03],[0.76,0.78,0.02],[0.82,0.55,0.01],[0.86,0.34,0.00]],
    acupoints: [0.25,0.65] },
  { name: 'Lung Meridian', organ: 'Tài Yīn · Metal · Respiration', color: 0xE8E8FF, width: 0.007,
    points: [[-0.20,2.00,0.10],[-0.32,1.80,0.08],[-0.46,1.55,0.06],[-0.58,1.28,0.04],[-0.68,1.02,0.03],[-0.76,0.78,0.02],[-0.82,0.55,0.01],[-0.86,0.34,0.00]],
    acupoints: [0.25,0.65] },
  { name: 'Stomach Meridian', organ: 'Yáng Míng · Earth · Digestion', color: 0xFFDD44, width: 0.007,
    points: [[0.06,2.60,0.16],[0.09,2.20,0.18],[0.11,1.80,0.19],[0.13,1.40,0.19],[0.14,1.00,0.17],[0.13,0.60,0.14],[0.11,0.28,0.10],[0.08,0.05,0.06]],
    acupoints: [0.3,0.6,0.85] },
  { name: 'Stomach Meridian', organ: 'Yáng Míng · Earth · Digestion', color: 0xFFDD44, width: 0.007,
    points: [[-0.06,2.60,0.16],[-0.09,2.20,0.18],[-0.11,1.80,0.19],[-0.13,1.40,0.19],[-0.14,1.00,0.17],[-0.13,0.60,0.14],[-0.11,0.28,0.10],[-0.08,0.05,0.06]],
    acupoints: [0.3,0.6,0.85] },
  { name: 'Bladder Meridian', organ: 'Tài Yáng · Water · Vitality', color: 0x88CCFF, width: 0.006,
    points: [[0.05,3.10,0.00],[0.07,2.70,-0.12],[0.09,2.30,-0.16],[0.11,1.90,-0.18],[0.12,1.50,-0.18],[0.13,1.10,-0.16],[0.14,0.70,-0.12],[0.13,0.30,-0.06],[0.10,0.05,-0.02]],
    acupoints: [0.2,0.5,0.8] },
  { name: 'Bladder Meridian', organ: 'Tài Yáng · Water · Vitality', color: 0x88CCFF, width: 0.006,
    points: [[-0.05,3.10,0.00],[-0.07,2.70,-0.12],[-0.09,2.30,-0.16],[-0.11,1.90,-0.18],[-0.12,1.50,-0.18],[-0.13,1.10,-0.16],[-0.14,0.70,-0.12],[-0.13,0.30,-0.06],[-0.10,0.05,-0.02]],
    acupoints: [0.2,0.5,0.8] },
  { name: 'Gallbladder Meridian', organ: 'Shào Yáng · Wood · Decisions', color: 0x88FF88, width: 0.006,
    points: [[0.22,2.55,-0.05],[0.24,2.20,0.00],[0.25,1.80,0.02],[0.24,1.40,0.02],[0.22,1.00,0.00],[0.20,0.60,-0.02],[0.17,0.22,-0.04]],
    acupoints: [0.35,0.7] },
  { name: 'Gallbladder Meridian', organ: 'Shào Yáng · Wood · Decisions', color: 0x88FF88, width: 0.006,
    points: [[-0.22,2.55,-0.05],[-0.24,2.20,0.00],[-0.25,1.80,0.02],[-0.24,1.40,0.02],[-0.22,1.00,0.00],[-0.20,0.60,-0.02],[-0.17,0.22,-0.04]],
    acupoints: [0.35,0.7] },
  { name: 'Heart Meridian', organ: 'Shào Yīn · Fire · Consciousness', color: 0xFF6688, width: 0.006,
    points: [[0.18,2.10,0.12],[0.28,1.88,0.10],[0.40,1.62,0.08],[0.52,1.35,0.06],[0.62,1.08,0.04],[0.70,0.82,0.02],[0.76,0.58,0.01]],
    acupoints: [0.3,0.7] },
  { name: 'Heart Meridian', organ: 'Shào Yīn · Fire · Consciousness', color: 0xFF6688, width: 0.006,
    points: [[-0.18,2.10,0.12],[-0.28,1.88,0.10],[-0.40,1.62,0.08],[-0.52,1.35,0.06],[-0.62,1.08,0.04],[-0.70,0.82,0.02],[-0.76,0.58,0.01]],
    acupoints: [0.3,0.7] },
];

// ═══════════════════════════════════════════
// BODY MODEL
// ═══════════════════════════════════════════
const bodyGroup = new THREE.Group();
scene.add(bodyGroup);
const MODEL_URL = 'https://caribbeantarzan.github.io/meridian/3d_human_body_wireframe_model.glb';
const loader = new THREE.GLTFLoader();
loader.load(MODEL_URL, (gltf) => {
  const model = gltf.scene;
  const box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const scale = 3.2 / Math.max(size.x, size.y, size.z);
  model.scale.setScalar(scale);
  model.position.set(-center.x*scale, -center.y*scale+1.6, -center.z*scale);
  model.traverse(child => {
    if (child.isMesh) {
      child.material = new THREE.MeshPhongMaterial({
        color: 0xAADDBB, transparent: true, opacity: 0.15,
        side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending,
      });
    }
  });
  bodyGroup.add(model);
  init();
}, undefined, () => { buildFallbackBody(); init(); });

function buildFallbackBody() {
  const mat = new THREE.MeshPhongMaterial({ color: 0xAADDBB, transparent: true, opacity: 0.15,
    side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending, wireframe: true });
  [[new THREE.CylinderGeometry(0.26,0.22,1.3,12),[0,1.65,0]],
   [new THREE.SphereGeometry(0.21,12,8),[0,2.65,0]],
   [new THREE.CylinderGeometry(0.22,0.2,0.38,10),[0,0.96,0]],
   [new THREE.CylinderGeometry(0.1,0.08,1.1,8),[-0.14,0.25,0]],
   [new THREE.CylinderGeometry(0.1,0.08,1.1,8),[0.14,0.25,0]],
  ].forEach(([geo,pos]) => { const m=new THREE.Mesh(geo,mat.clone()); m.position.set(...pos); bodyGroup.add(m); });
}

// ═══════════════════════════════════════════
// MERIDIANS + ACUPOINTS
// ═══════════════════════════════════════════
const meridianGroup = new THREE.Group();
scene.add(meridianGroup);
let allCurves = [];
let acupointMeshes = [];
const flowParticles = [];
const ambientParticles = [];

const labelZones = [
  {from:0.05,to:0.18,idx:0},{from:0.18,to:0.30,idx:1},
  {from:0.30,to:0.44,idx:10},{from:0.44,to:0.56,idx:4},
  {from:0.56,to:0.68,idx:6},{from:0.68,to:0.80,idx:8},{from:0.80,to:0.92,idx:2},
];

function buildMeridians() {
  while(meridianGroup.children.length) meridianGroup.remove(meridianGroup.children[0]);
  allCurves=[]; acupointMeshes=[];
  MERIDIAN_DEFS.forEach((m,mi) => {
    const pts = m.points.map(p => new THREE.Vector3(...p));
    const curve = new THREE.CatmullRomCurve3(pts);
    allCurves.push({curve, def:m, index:mi});
    meridianGroup.add(new THREE.Mesh(
      new THREE.TubeGeometry(curve,80,m.width,6,false),
      new THREE.MeshBasicMaterial({color:m.color,transparent:true,opacity:0.85})
    ));
    meridianGroup.add(new THREE.Mesh(
      new THREE.TubeGeometry(curve,80,m.width*3.5,6,false),
      new THREE.MeshBasicMaterial({color:m.color,transparent:true,opacity:0.12,blending:THREE.AdditiveBlending,depthWrite:false})
    ));
    (m.acupoints||[]).forEach(t => {
      const pos = curve.getPoint(t);
      const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.028,8,8),
        new THREE.MeshBasicMaterial({color:m.color,transparent:true,opacity:0.9,blending:THREE.AdditiveBlending,depthWrite:false}));
      sphere.position.copy(pos);
      const ring = new THREE.Mesh(new THREE.SphereGeometry(0.055,8,8),
        new THREE.MeshBasicMaterial({color:m.color,transparent:true,opacity:0.2,blending:THREE.AdditiveBlending,depthWrite:false}));
      ring.position.copy(pos);
      acupointMeshes.push({sphere,ring});
      meridianGroup.add(sphere); meridianGroup.add(ring);
    });
  });
}

function buildFlowParticles() {
  flowParticles.forEach(p=>scene.remove(p.mesh)); flowParticles.length=0;
  if(!allCurves.length) return;
  const geo = new THREE.SphereGeometry(0.018,6,6);
  for(let i=0;i<120;i++) {
    const ci = Math.floor(Math.random()*allCurves.length);
    const mat = new THREE.MeshBasicMaterial({color:allCurves[ci].def.color,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false});
    const mesh = new THREE.Mesh(geo,mat);
    const t = Math.random();
    flowParticles.push({mesh,ci,t,baseSpeed:0.0005+Math.random()*0.001});
    scene.add(mesh);
  }
}

function buildAmbientParticles() {
  const geo = new THREE.SphereGeometry(0.008,4,4);
  for(let i=0;i<60;i++) {
    const angle = Math.random()*Math.PI*2;
    const radius = 0.5+Math.random()*1.2;
    const y = 0.1+Math.random()*3.1;
    const mat = new THREE.MeshBasicMaterial({color:0xFFEE88,transparent:true,opacity:0.08,blending:THREE.AdditiveBlending,depthWrite:false});
    const mesh = new THREE.Mesh(geo,mat);
    mesh.position.set(Math.cos(angle)*radius,y,Math.sin(angle)*radius*0.5);
    ambientParticles.push({mesh,baseY:y,floatSpeed:0.0003+Math.random()*0.0005,floatAmp:0.08+Math.random()*0.12,phase:Math.random()*Math.PI*2,orbitSpeed:(Math.random()-0.5)*0.002,orbitRadius:radius,orbitAngle:angle});
    scene.add(mesh);
  }
}

function init() { buildMeridians(); buildFlowParticles(); buildAmbientParticles(); }

// ═══════════════════════════════════════════
// CAMERA PATH
// ═══════════════════════════════════════════
const camPath = new THREE.CatmullRomCurve3([
  new THREE.Vector3(0.3,1.70,4.2),
  new THREE.Vector3(-0.2,1.70,3.0),
  new THREE.Vector3(0.15,1.65,1.8),
  new THREE.Vector3(-0.1,1.60,0.9),
  new THREE.Vector3(0,1.50,0.3),
  new THREE.Vector3(0,1.10,0.2),
  new THREE.Vector3(0,0.60,0.25),
  new THREE.Vector3(0,0.20,0.35),
  new THREE.Vector3(0,1.20,0.15),
  new THREE.Vector3(0,2.60,0.5),
  new THREE.Vector3(0,3.60,2.0),
]);
const lookPath = new THREE.CatmullRomCurve3([
  new THREE.Vector3(0,1.60,0),new THREE.Vector3(0,1.60,0),new THREE.Vector3(0,1.58,0),
  new THREE.Vector3(0,1.50,0),new THREE.Vector3(0,1.35,0),new THREE.Vector3(0,1.00,0),
  new THREE.Vector3(0,0.55,0),new THREE.Vector3(0,0.25,0),new THREE.Vector3(0,1.10,0),
  new THREE.Vector3(0,2.10,0),new THREE.Vector3(0,2.20,0),
]);
camera.position.copy(camPath.getPoint(0));
camera.lookAt(lookPath.getPoint(0));

// ═══════════════════════════════════════════
// SCROLL — reads from own container (sticky)
// ═══════════════════════════════════════════
// ═══════════════════════════════════════════
// SCROLL STATE — driven by Wix Velo
// Velo sends meridianScroll (0→1) via postMessage
// and handles all page locking on both desktop
// and mobile. iframe just receives and renders.
// ═══════════════════════════════════════════
let scrollProgress = 0;
let targetProgress = 0;
let scrollVelocity = 0;
let isScrolling = false;
let scrollStopTimer = null;
let lastTarget = 0;

window.addEventListener('message', (e) => {
  if (e.data && typeof e.data.meridianScroll === 'number') {
    const raw = Math.min(Math.max(e.data.meridianScroll, 0), 1);
    scrollVelocity = Math.abs(raw - lastTarget);
    lastTarget = raw;
    targetProgress = raw;

    isScrolling = true;
    clearTimeout(scrollStopTimer);
    scrollStopTimer = setTimeout(() => { isScrolling = false; }, 200);
  }
});

// ═══════════════════════════════════════════
// SOUND
// ═══════════════════════════════════════════
let audioCtx=null, soundOn=false;
function initAudio() {
  if(audioCtx) return;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  const master = audioCtx.createGain();
  master.gain.setValueAtTime(0,audioCtx.currentTime);
  master.gain.linearRampToValueAtTime(0.07,audioCtx.currentTime+3);
  master.connect(audioCtx.destination);
  [136.1,272.2,182.0,204.4].forEach((freq,i) => {
    const osc=audioCtx.createOscillator(), gain=audioCtx.createGain(), pan=audioCtx.createStereoPanner();
    osc.frequency.setValueAtTime(freq,audioCtx.currentTime);
    gain.gain.setValueAtTime(i===0?0.6:0.15/i,audioCtx.currentTime);
    pan.pan.setValueAtTime((i%2===0?1:-1)*0.3,audioCtx.currentTime);
    osc.connect(gain); gain.connect(pan); pan.connect(master); osc.start();
  });
}
function toggleSound() {
  const btn=document.getElementById('sound-btn');
  if(!soundOn){initAudio();if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();soundOn=true;btn.textContent='♪ SOUND ON';btn.style.color='rgba(245,200,66,1)';}
  else{if(audioCtx)audioCtx.suspend();soundOn=false;btn.textContent='♪ SOUND OFF';btn.style.color='rgba(245,200,66,0.6)';}
}

// ═══════════════════════════════════════════
// LABEL SYSTEM
// ═══════════════════════════════════════════
const labelEl=document.getElementById('meridian-label');
const labelName=document.getElementById('label-name');
const labelOrgan=document.getElementById('label-organ');
let currentLabelIdx=-1, labelTimeout=null;
function updateLabel(progress) {
  let found=-1;
  for(const z of labelZones){if(progress>=z.from&&progress<z.to){found=z.idx;break;}}
  if(found!==currentLabelIdx){
    currentLabelIdx=found;
    if(found>=0&&found<MERIDIAN_DEFS.length){
      const def=MERIDIAN_DEFS[found];
      labelName.textContent=def.name; labelOrgan.textContent=def.organ;
      labelEl.style.opacity='1';
      clearTimeout(labelTimeout);
      labelTimeout=setTimeout(()=>{labelEl.style.opacity='0';},2200);
    } else { labelEl.style.opacity='0'; }
  }
}

// ═══════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════
const clock = new THREE.Clock();
const endCta = document.getElementById('end-cta');
const progressFill = document.getElementById('progress-fill');
const scrollHint = document.getElementById('scroll-hint');

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  scrollVelocity *= 0.88;

  // When scrolling: smooth lerp. When stopped: hard snap to target.
  // This prevents any drift or rewind when the user pauses.
  if (isScrolling) {
    scrollProgress += (targetProgress - scrollProgress) * 0.10;
  } else {
    scrollProgress = targetProgress; // hard snap — no drift possible
  }

  // Extra safety clamp
  if (Math.abs(scrollProgress - targetProgress) < 0.0002) scrollProgress = targetProgress;

  const speedMult = 1 + scrollVelocity * 35;

  // Flow particles
  flowParticles.forEach(p => {
    p.t += p.baseSpeed * speedMult;
    if(p.t>1) p.t-=1;
    if(allCurves[p.ci]) {
      p.mesh.position.copy(allCurves[p.ci].curve.getPoint(p.t));
      p.mesh.material.opacity = 0.35+0.65*Math.sin(t*4+p.t*18);
    }
  });

  // Ambient particles
  ambientParticles.forEach(p => {
    p.orbitAngle += p.orbitSpeed;
    p.mesh.position.x = Math.cos(p.orbitAngle)*p.orbitRadius;
    p.mesh.position.z = Math.sin(p.orbitAngle)*p.orbitRadius*0.4;
    p.mesh.position.y = p.baseY + Math.sin(t*p.floatSpeed*1000+p.phase)*p.floatAmp;
    p.mesh.material.opacity = 0.04+0.1*Math.abs(Math.sin(t*0.4+p.phase));
  });

  // Acupoints pulse
  acupointMeshes.forEach((ap,i) => {
    const pulse = 0.7+0.3*Math.sin(t*2.5+i*0.7);
    ap.sphere.material.opacity=pulse;
    ap.ring.scale.setScalar(0.9+0.4*Math.sin(t*1.8+i));
    ap.ring.material.opacity=0.08+0.12*Math.sin(t*1.8+i);
  });

  // Camera
  const camPos = camPath.getPoint(Math.min(scrollProgress,0.9999));
  const lookAt = lookPath.getPoint(Math.min(scrollProgress,0.9999));
  camera.position.lerp(camPos,0.07);
  camera.lookAt(lookAt);

  // Lights
  goldLight.intensity=2.2+1.0*Math.sin(t*1.8);
  fillLight.intensity=0.6+0.4*Math.sin(t*2.3+1);

  // Body sway
  bodyGroup.rotation.y=Math.sin(t*0.18)*0.07;

  // UI updates
  updateLabel(scrollProgress);
  progressFill.style.height = (scrollProgress*100)+'%';
  scrollHint.style.opacity = scrollProgress < 0.04 ? '1' : '0';
  // CTA: once visible, stays visible — don't hide it when scroll drifts
  if (scrollProgress > 0.92) {
    endCta.classList.add('visible');
  }

  if(composer) composer.render();
  else renderer.render(scene,camera);
}
animate();

// ═══════════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════════
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
  if(composer) composer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
