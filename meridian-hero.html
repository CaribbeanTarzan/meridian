<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meridian Flow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: transparent;
  }
  #canvas-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: transparent;
  }
  canvas { display: block; background: transparent; }

  /* Scroll trigger area — tall div outside canvas */
  #scroll-driver {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 600vh; /* 6x viewport = scroll journey length */
    pointer-events: none;
    z-index: 0;
  }
  #sticky-wrap {
    position: sticky;
    top: 0;
    width: 100%;
    height: 100vh;
    z-index: 1;
  }

  /* Overlay text that fades in/out */
  #overlay {
    position: absolute;
    bottom: 12%;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
    z-index: 10;
    transition: opacity 0.6s ease;
  }
  #overlay h1 {
    font-family: 'Georgia', serif;
    font-size: clamp(1.4rem, 3vw, 2.2rem);
    color: #F5C842;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-shadow: 0 0 30px rgba(245,200,66,0.7), 0 0 60px rgba(245,200,66,0.3);
    margin-bottom: 0.5rem;
  }
  #overlay p {
    font-family: 'Georgia', serif;
    font-size: clamp(0.75rem, 1.5vw, 1rem);
    color: rgba(245,200,66,0.65);
    letter-spacing: 0.12em;
  }
  #scroll-hint {
    position: absolute;
    bottom: 4%;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    pointer-events: none;
    z-index: 10;
    transition: opacity 0.6s ease;
  }
  #scroll-hint span {
    font-family: 'Georgia', serif;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: rgba(245,200,66,0.5);
    text-transform: uppercase;
  }
  .arrow {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, rgba(245,200,66,0.6), transparent);
    animation: pulse-arrow 2s ease-in-out infinite;
  }
  @keyframes pulse-arrow {
    0%, 100% { opacity: 0.4; transform: scaleY(1); }
    50% { opacity: 1; transform: scaleY(1.1); }
  }
</style>
</head>
<body>

<div id="scroll-driver">
  <div id="sticky-wrap">
    <div id="canvas-container">
      <canvas id="threeCanvas"></canvas>
    </div>
    <div id="overlay">
      <h1>Follow the Energy</h1>
      <p>Ancient pathways · Scroll to journey within</p>
    </div>
    <div id="scroll-hint">
      <span>Scroll</span>
      <div class="arrow"></div>
    </div>
  </div>
</div>

<!-- Three.js from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>

<script>
// ─── SCENE SETUP ────────────────────────────────────────────────────────────
const canvas = document.getElementById('threeCanvas');
const renderer = new THREE.WebGLRenderer({
  canvas,
  antialias: true,
  alpha: true   // transparent background
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);  // fully transparent

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.set(0, 1.6, 3.5);
camera.lookAt(0, 1, 0);

// ─── LIGHTING ────────────────────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0xfff5d0, 0.4);
scene.add(ambientLight);

const goldLight = new THREE.PointLight(0xF5C842, 2, 8);
goldLight.position.set(0, 2, 2);
scene.add(goldLight);

const rimLight = new THREE.DirectionalLight(0xFFE070, 0.6);
rimLight.position.set(-2, 3, -2);
scene.add(rimLight);

// ─── MERIDIAN PATHS (TCM-inspired routes on the body) ─────────────────────
// These are 3D spline paths approximating key meridian channels.
// Coordinates assume body center at origin, height ~0 (feet) to ~3.2 (crown).
// Adjust Y-scale after loading your model if needed.

const meridianData = [
  // Governing Vessel (Du Mai) — spine, up the back
  { color: 0xF5C842, points: [
    [0, 0.1, -0.12], [0, 0.4, -0.14], [0, 0.8, -0.16],
    [0, 1.2, -0.18], [0, 1.6, -0.2], [0, 2.0, -0.18],
    [0, 2.4, -0.14], [0, 2.7, -0.08], [0, 2.9, 0.0], [0, 3.1, 0.1]
  ]},
  // Conception Vessel (Ren Mai) — front midline
  { color: 0xFFAA22, points: [
    [0, 0.15, 0.14], [0, 0.4, 0.16], [0, 0.8, 0.18],
    [0, 1.2, 0.2], [0, 1.6, 0.22], [0, 2.0, 0.2],
    [0, 2.4, 0.16], [0, 2.8, 0.1], [0, 3.05, 0.05]
  ]},
  // Lung Meridian — right arm, inner
  { color: 0xF5D060, points: [
    [0.18, 1.55, 0.1], [0.3, 1.4, 0.12], [0.45, 1.2, 0.1],
    [0.6, 0.95, 0.08], [0.72, 0.75, 0.06], [0.82, 0.55, 0.04],
    [0.9, 0.38, 0.02], [0.95, 0.22, 0.0]
  ]},
  // Lung Meridian — left arm (mirror)
  { color: 0xF5D060, points: [
    [-0.18, 1.55, 0.1], [-0.3, 1.4, 0.12], [-0.45, 1.2, 0.1],
    [-0.6, 0.95, 0.08], [-0.72, 0.75, 0.06], [-0.82, 0.55, 0.04],
    [-0.9, 0.38, 0.02], [-0.95, 0.22, 0.0]
  ]},
  // Stomach Meridian — right leg, front
  { color: 0xFFB830, points: [
    [0.08, 2.7, 0.14], [0.1, 2.3, 0.16], [0.12, 1.9, 0.18],
    [0.14, 1.5, 0.18], [0.15, 1.1, 0.16], [0.14, 0.7, 0.14],
    [0.12, 0.35, 0.1], [0.1, 0.05, 0.06]
  ]},
  // Stomach Meridian — left leg (mirror)
  { color: 0xFFB830, points: [
    [-0.08, 2.7, 0.14], [-0.1, 2.3, 0.16], [-0.12, 1.9, 0.18],
    [-0.14, 1.5, 0.18], [-0.15, 1.1, 0.16], [-0.14, 0.7, 0.14],
    [-0.12, 0.35, 0.1], [-0.1, 0.05, 0.06]
  ]},
  // Bladder Meridian — right side of spine
  { color: 0xE8A820, points: [
    [0.06, 3.0, 0.0], [0.08, 2.6, -0.1], [0.1, 2.2, -0.14],
    [0.12, 1.8, -0.16], [0.14, 1.4, -0.16], [0.16, 1.0, -0.14],
    [0.18, 0.6, -0.1], [0.2, 0.2, -0.06]
  ]},
];

// Build CatmullRom tubes for each meridian
const meridianGroup = new THREE.Group();
const allCurves = [];

meridianData.forEach(m => {
  const pts = m.points.map(p => new THREE.Vector3(...p));
  const curve = new THREE.CatmullRomCurve3(pts);
  allCurves.push(curve);

  // Glowing tube
  const tubeGeo = new THREE.TubeGeometry(curve, 60, 0.008, 6, false);
  const tubeMat = new THREE.MeshBasicMaterial({
    color: m.color,
    transparent: true,
    opacity: 0.85,
  });
  const tube = new THREE.Mesh(tubeGeo, tubeMat);
  meridianGroup.add(tube);

  // Thicker glow halo (additive blend)
  const haloGeo = new THREE.TubeGeometry(curve, 60, 0.022, 6, false);
  const haloMat = new THREE.MeshBasicMaterial({
    color: m.color,
    transparent: true,
    opacity: 0.12,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  const halo = new THREE.Mesh(haloGeo, haloMat);
  meridianGroup.add(halo);
});

scene.add(meridianGroup);

// ─── ENERGY PARTICLES ────────────────────────────────────────────────────────
// Small glowing spheres that flow along the meridian paths
const PARTICLE_COUNT = 80;
const particles = [];
const particleGeo = new THREE.SphereGeometry(0.015, 6, 6);
const particleMat = new THREE.MeshBasicMaterial({
  color: 0xFFE566,
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});

for (let i = 0; i < PARTICLE_COUNT; i++) {
  const mesh = new THREE.Mesh(particleGeo, particleMat.clone());
  const curveIdx = Math.floor(Math.random() * allCurves.length);
  const t = Math.random();
  particles.push({
    mesh,
    curveIdx,
    t,
    speed: 0.0008 + Math.random() * 0.0012,
  });
  const pos = allCurves[curveIdx].getPoint(t);
  mesh.position.copy(pos);
  scene.add(mesh);
}

// ─── LOAD YOUR .GLB MODEL ────────────────────────────────────────────────────
// IMPORTANT: Replace 'YOUR_MODEL_URL_HERE' with the URL of your hosted .glb file
// (e.g. from GitHub Pages: https://yourusername.github.io/yourrepo/body.glb)
const MODEL_URL = 'https://caribbeantarzan.github.io/meridian/3d_human_body_wireframe_model.glb';

let bodyMesh = null;

const loader = new THREE.GLTFLoader();
loader.load(
  MODEL_URL,
  (gltf) => {
    const model = gltf.scene;

    // Auto-center and scale the model
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 3.2 / maxDim; // target ~3.2 units tall
    model.scale.setScalar(scale);
    model.position.sub(center.multiplyScalar(scale));
    model.position.y += 1.6; // lift to body center

    // Make transparent with a soft ghost material
    model.traverse(child => {
      if (child.isMesh) {
        child.material = new THREE.MeshPhongMaterial({
          color: 0xCCEEFF,
          transparent: true,
          opacity: 0.13,
          side: THREE.DoubleSide,
          depthWrite: false,
          blending: THREE.AdditiveBlending,
          wireframe: false,
        });
      }
    });

    scene.add(model);
    bodyMesh = model;
  },
  undefined,
  (err) => {
    // If model fails to load, show a fallback wireframe capsule body
    console.warn('Model load failed, using fallback geometry', err);
    buildFallbackBody();
  }
);

// Fallback body if model URL not set yet
function buildFallbackBody() {
  const group = new THREE.Group();
  const mat = new THREE.MeshPhongMaterial({
    color: 0xCCEEFF, transparent: true, opacity: 0.1,
    side: THREE.DoubleSide, depthWrite: false,
    blending: THREE.AdditiveBlending, wireframe: true,
  });
  // Torso
  const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.22, 1.3, 12), mat.clone());
  torso.position.y = 1.65; group.add(torso);
  // Head
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.22, 12, 8), mat.clone());
  head.position.y = 2.65; group.add(head);
  // Pelvis
  const pelvis = new THREE.Mesh(new THREE.CylinderGeometry(0.24, 0.2, 0.35, 10), mat.clone());
  pelvis.position.y = 0.95; group.add(pelvis);
  // Legs
  [-0.14, 0.14].forEach(x => {
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.08, 1.1, 8), mat.clone());
    leg.position.set(x, 0.25, 0); group.add(leg);
  });
  // Arms
  [-0.5, 0.5].forEach(x => {
    const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.055, 1.0, 8), mat.clone());
    arm.position.set(x, 1.6, 0);
    arm.rotation.z = x > 0 ? -0.25 : 0.25;
    group.add(arm);
  });
  scene.add(group);
  bodyMesh = group;
}

// ─── CAMERA SCROLL PATH ──────────────────────────────────────────────────────
// Camera journeys from outside → inside → through the body → back out
const cameraPath = new THREE.CatmullRomCurve3([
  new THREE.Vector3(0, 1.7, 3.8),   // 0% — wide establishing shot
  new THREE.Vector3(0, 1.7, 2.2),   // 15% — move closer
  new THREE.Vector3(0, 1.7, 0.6),   // 30% — enter the body (chest level)
  new THREE.Vector3(0.05, 1.3, 0.2),// 45% — inside torso, angled slightly
  new THREE.Vector3(0, 0.9, 0.3),   // 60% — descend to abdomen
  new THREE.Vector3(0, 0.5, 0.4),   // 70% — lower body
  new THREE.Vector3(0, 1.5, 0.1),   // 80% — rise back up
  new THREE.Vector3(0, 2.4, 0.5),   // 90% — ascend to crown
  new THREE.Vector3(0, 3.2, 1.5),   // 100% — exit above, looking down
]);

const cameraLookPath = new THREE.CatmullRomCurve3([
  new THREE.Vector3(0, 1.3, 0),
  new THREE.Vector3(0, 1.4, 0),
  new THREE.Vector3(0, 1.5, 0),
  new THREE.Vector3(0, 1.2, 0),
  new THREE.Vector3(0, 1.0, 0),
  new THREE.Vector3(0, 0.6, 0),
  new THREE.Vector3(0, 1.2, 0),
  new THREE.Vector3(0, 2.0, 0),
  new THREE.Vector3(0, 1.8, 0),
]);

// ─── SCROLL STATE ────────────────────────────────────────────────────────────
let scrollProgress = 0;
const overlay = document.getElementById('overlay');
const scrollHint = document.getElementById('scroll-hint');

// Listen to parent window scroll (iframe needs postMessage)
// For same-domain Wix Velo integration:
window.addEventListener('message', (e) => {
  if (e.data && typeof e.data.scrollY === 'number') {
    const maxScroll = document.getElementById('scroll-driver').offsetHeight - window.innerHeight;
    scrollProgress = Math.min(e.data.scrollY / maxScroll, 1);
  }
});

// Also handle scroll within the iframe itself (fallback)
const scrollEl = document.getElementById('scroll-driver').parentElement || window;
window.addEventListener('scroll', () => {
  const el = document.documentElement;
  const max = el.scrollHeight - el.clientHeight;
  if (max > 0) scrollProgress = el.scrollTop / max;
}, { passive: true });

// ─── ANIMATION LOOP ──────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let frame = 0;

function animate() {
  requestAnimationFrame(animate);
  const elapsed = clock.getElapsedTime();
  frame++;

  // Move particles along meridian curves
  particles.forEach(p => {
    p.t += p.speed;
    if (p.t > 1) p.t -= 1;
    const pos = allCurves[p.curveIdx].getPoint(p.t);
    p.mesh.position.copy(pos);
    // Pulse opacity
    p.mesh.material.opacity = 0.5 + 0.5 * Math.sin(elapsed * 3 + p.t * 20);
  });

  // Scroll-driven camera
  const camPos = cameraPath.getPoint(scrollProgress);
  const lookAt = cameraLookPath.getPoint(scrollProgress);
  camera.position.lerp(camPos, 0.06);
  camera.lookAt(lookAt);

  // Pulse meridian glow
  goldLight.intensity = 1.6 + 0.6 * Math.sin(elapsed * 1.8);

  // Overlay fade — hide after 20% scroll
  const overlayOpacity = scrollProgress < 0.12 ? 1 : Math.max(0, 1 - (scrollProgress - 0.12) / 0.08);
  overlay.style.opacity = overlayOpacity;
  scrollHint.style.opacity = scrollProgress < 0.05 ? 1 : 0;

  // Slow body rotation on Y axis (ambient life)
  if (bodyMesh) {
    bodyMesh.rotation.y = Math.sin(elapsed * 0.15) * 0.08;
  }

  renderer.render(scene, camera);
}

animate();

// ─── RESIZE HANDLER ─────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
